<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="320" viewBox="0 0 1200 320" role="img" aria-labelledby="title desc">
  <title id="title">Flow Studio logo</title>
  <desc id="desc">A connected flow shaped like the letter F beside the words Flow Studio.</desc>
  <defs>
    <linearGradient id="tile" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#20242B"/>
      <stop offset="1" stop-color="#121418"/>
    </linearGradient>
    <linearGradient id="flow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#78B7FF"/>
      <stop offset="0.55" stop-color="#2783DE"/>
      <stop offset="1" stop-color="#1665B5"/>
    </linearGradient>
    <filter id="shadow" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#111827" flood-opacity="0.18"/>
    </filter>
  </defs>

  <g transform="translate(36 36)" filter="url(#shadow)">
    <rect width="248" height="248" rx="56" fill="url(#tile)"/>
    <rect x="1" y="1" width="246" height="246" rx="55" fill="none" stroke="#FFFFFF" stroke-opacity="0.12" stroke-width="2"/>

    <path d="M70 63H168C182 63 193 74 193 88V91" fill="none" stroke="url(#flow)" stroke-width="17" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M70 63V185" fill="none" stroke="url(#flow)" stroke-width="17" stroke-linecap="round"/>
    <path d="M70 124H146" fill="none" stroke="url(#flow)" stroke-width="17" stroke-linecap="round"/>

    <circle cx="70" cy="63" r="17" fill="#FFFFFF"/>
    <circle cx="193" cy="91" r="17" fill="#72BC8F"/>
    <circle cx="146" cy="124" r="17" fill="#FFFFFF"/>
    <circle cx="70" cy="185" r="17" fill="#FFFFFF"/>

    <circle cx="70" cy="63" r="7" fill="#2783DE"/>
    <circle cx="193" cy="91" r="7" fill="#173E2C"/>
    <circle cx="146" cy="124" r="7" fill="#2783DE"/>
    <circle cx="70" cy="185" r="7" fill="#2783DE"/>
  </g>

  <g transform="translate(340 0)">
    <text x="0" y="148" fill="#202124" font-family="Arial, Helvetica, sans-serif" font-size="96" font-weight="700" letter-spacing="-4">Flow</text>
    <text x="232" y="148" fill="#2783DE" font-family="Arial, Helvetica, sans-serif" font-size="96" font-weight="700" letter-spacing="-4">Studio</text>
    <text x="3" y="207" fill="#6B7280" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="500" letter-spacing="1.1">TEACH ONCE · VERIFY SAFELY · RUN RELIABLY</text>
  </g>
</svg>
