schemaVersion: 1
application:
  key: aadhaar_download
  name: aadhaar_download
  portal: uidai
  version: 1
  entryUrl: https://myaadhaar.uidai.gov.in/genricDownloadAadhaar/en
fields:
  - key: enter_aadhaar_number
    label: Enter Aadhaar Number
    type: text
    required: true
    sensitive: true
  - key: enter_captcha
    label: Enter Captcha
    type: text
    required: true
    sensitive: true
  - key: enter_otp
    label: Enter OTP
    type: text
    required: true
    sensitive: true
documents: []
flow:
  initialState: en
  entryStates:
    - en
  terminalStates:
    - completed
    - cancelled
    - submission_unknown
  states:
    en:
      description: Recorded page 1
      detect:
        urlContains:
          - /genricDownloadAadhaar/en
      resumable: true
      replayPolicy: detect_and_continue
      steps:
        - id: fill_enter_aadhaar_number
          type: fill
          field: enter_aadhaar_number
          mode: fill_if_empty
          existingValuePolicy: manual_review_on_mismatch
          target:
            labels:
              - Enter Aadhaar Number
            nameAttribute: uid
            placeholder:
              - '000000000000'
          retry:
            maximumAttempts: 2
            strategy: resolve_target
          success:
            - type: field_value_equals
              expected: '{{fields.enter_aadhaar_number}}'
              target:
                labels:
                  - Enter Aadhaar Number
                nameAttribute: uid
                placeholder:
                  - '000000000000'
        - id: click_enter_captcha
          type: click
          target:
            text:
              - Enter Captcha
        - id: fill_enter_captcha
          type: human_input
          reason: captcha
          prompt: Enter the CAPTCHA in Chrome, or enter it in Flow Studio so the agent fills Chrome.
          inputMode: operator_in_browser
          target:
            labels:
              - Enter Captcha
            nameAttribute: captcha
          maximumAttempts: 3
        - id: click_send_otp
          type: click
          target:
            role:
              type: button
              name: Send OTP
            text:
              - Send OTP
        - id: fill_enter_otp
          type: human_input
          reason: otp
          prompt: Enter the OTP in Chrome, or enter it in Flow Studio so the agent fills Chrome.
          inputMode: callback_value
          target:
            labels:
              - Enter OTP
            nameAttribute: otp
          maximumAttempts: 3
        - id: click_verify_download
          type: click
          target:
            role:
              type: button
              name: Verify & Download
            text:
              - Verify & Download
        - id: download_download_7
          type: download
          artifact: eaadhaar_2189420358744120171107172413_17072026111112_pdf
          target:
            text:
              - Download
        - id: click_go_to_dashboard
          type: click
          target:
            role:
              type: button
              name: Go to Dashboard
            text:
              - Go to Dashboard
      transitions:
        success: page_2
        unknown: manual_review
    page_2:
      description: Recorded page 2
      detect:
        urlContains:
          - /
      resumable: true
      replayPolicy: detect_and_continue
      steps: []
      transitions:
        success: completed
        unknown: manual_review
    manual_review:
      description: Unexpected page or portal drift
      detect:
        visibleText:
          - replace_me
      resumable: false
      replayPolicy: manual_only
      steps:
        - id: manual_review
          type: human_input
          reason: other
          prompt: Resolve the unexpected page in Chrome, then continue.
      transitions:
        success: en
